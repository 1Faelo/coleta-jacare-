<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Pontos de Coleta - Jacareí</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f4f2;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background: #1a7a4a;
      color: white;
      padding: 12px 20px;
      flex-shrink: 0;
    }

    header h1 { font-family: 'Syne', sans-serif; font-size: 1.2rem; }
    header h1 span { color: #a8e6c1; }
    header p { font-size: 0.75rem; opacity: 0.85; }

    .filtros {
      background: white;
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #ddd;
      overflow-x: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filtros span { font-size: 0.75rem; color: #666; font-weight: bold; margin-right: 5px; }

    .btn {
      border: 2px solid #ddd;
      background: white;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn.ativo { background: #1a7a4a; border-color: #1a7a4a; color: white; }

    /* LAYOUT PRINCIPAL */
    .conteudo {
      display: flex;
      flex: 1;
      position: relative;
      overflow: hidden;
      flex-direction: row;
    }

    #mapa { flex: 1; width: 100%; height: 100%; z-index: 1; }

    /* BOTÃO CENTRALIZAR */
    .btn-centralizar {
      position: absolute;
      top: 10px;
      left: 50px; /* Posicionado ao lado dos controles de zoom padrão */
      z-index: 1000;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }

    .btn-centralizar:hover {
      background: #f0f0f0;
      transform: scale(1.05);
    }

    /* PAINEL LATERAL / INFERIOR */
    .painel {
      width: 320px;
      background: white;
      border-left: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .painel-titulo {
      padding: 12px 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .contagem { background: #1a7a4a; color: white; border-radius: 10px; padding: 1px 8px; font-size: 0.7rem; }

    #lista { overflow-y: auto; flex: 1; }

    /* BOTÃO TOGGLE (Desktop) */
    .btn-toggle {
      position: absolute;
      right: 320px;
      top: 50%;
      z-index: 1000;
      background: #1a7a4a;
      color: white;
      border: none;
      border-radius: 8px 0 0 8px;
      width: 24px;
      height: 50px;
      cursor: pointer;
      transition: right 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* MEDIA QUERIES MOBILE */
    @media (max-width: 768px) {
      body { overflow-y: auto; }
      
      .conteudo {
        flex-direction: column;
        height: auto;
        overflow: visible;
      }

      #mapa {
        height: 45vh;
        flex: none;
      }

      .btn-centralizar {
        left: 100px; /* No mobile fica mais à esquerda */
      }

      .painel {
        width: 100%;
        height: auto;
        border-left: none;
        border-top: 1px solid #ddd;
      }

      .btn-toggle { display: none; }
      .painel.recolhido { display: none; }
    }

    /* CARDS */
    .card { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
    .card:hover { background: #f9f9f9; }
    .card-nome { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
    .card-end { font-size: 0.75rem; color: #666; margin-bottom: 8px; }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { border-radius: 4px; padding: 3px 8px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
    .tag-reciclaveis { background: #e8f5ee; color: #1a7a4a; }
    .tag-entulhos    { background: #fdf0e3; color: #c26a1e; }
    .tag-eletronicos { background: #e3eef9; color: #1e5fa0; }
  </style>
</head>
<body>

  <header>
    <h1>♻ Coleta<span>Jacareí</span></h1>
    <p>Pontos de descarte e reciclagem da cidade</p>
  </header>

  <div class="filtros">
    <span>Filtrar:</span>
    <button class="btn ativo" onclick="filtrar('todos', this)">Todos</button>
    <button class="btn" onclick="filtrar('reciclaveis', this)">♻ Recicláveis</button>
    <button class="btn" onclick="filtrar('entulhos', this)">🏗 Entulho</button>
    <button class="btn" onclick="filtrar('eletronicos', this)">💻 Eletrônicos</button>
  </div>

  <div class="conteudo">
    <button class="btn-centralizar" onclick="centralizarJacarei()" title="Centralizar em Jacareí">
        🎯
    </button>

    <div id="mapa"></div>

    <button class="btn-toggle" id="btnToggle" onclick="togglePainel()">❮</button>

    <div class="painel" id="painel">
      <div class="painel-titulo">
        Pontos encontrados
        <span class="contagem" id="contagem">0</span>
      </div>
      <div id="lista"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Configurações iniciais
    const centroJacarei = [-23.3045, -45.9659];
    const mapa = L.map('mapa', { zoomControl: true }).setView(centroJacarei, 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(mapa);

    let todosPontos = [];
    let marcadores = [];
    let painelAberto = window.innerWidth > 768;

    // Carregar os dados
    fetch('pontos.json')
      .then(response => response.json())
      .then(data => {
        todosPontos = data;
        renderizar(todosPontos);
      })
      .catch(err => console.error("Erro ao carregar pontos.json:", err));

    function centralizarJacarei() {
      mapa.setView(centroJacarei, 13);
      mapa.closePopup();
    }

    function togglePainel() {
      const painel = document.getElementById('painel');
      const btn = document.getElementById('btnToggle');
      painelAberto = !painelAberto;

      if (painelAberto) {
        painel.style.width = "320px";
        btn.style.right = "320px";
        btn.textContent = '❮';
      } else {
        painel.style.width = "0";
        btn.style.right = "0";
        btn.textContent = '❯';
      }
      setTimeout(() => mapa.invalidateSize(), 310);
    }

    function renderizar(lista) {
      // Limpar marcadores anteriores
      marcadores.forEach(m => mapa.removeLayer(m));
      marcadores = [];
      const listaEl = document.getElementById('lista');
      listaEl.innerHTML = '';
      document.getElementById('contagem').textContent = lista.length;

      lista.forEach(ponto => {
        // Marcador no Mapa
        const m = L.marker([ponto.latitude, ponto.longitude]).addTo(mapa);
        const popupContent = `
          <div style="min-width: 150px">
            <strong>${ponto.nome}</strong><br>
            <small>${ponto.endereco}</small><br>
            <p style="margin-top:5px; font-size:11px">⏰ ${ponto.horario}</p>
            <a href="${ponto.url}" target="_blank" style="color:#1a7a4a; font-weight:bold">Ver mais</a>
          </div>
        `;
        m.bindPopup(popupContent);
        marcadores.push(m);

        // Card na Lista
        const card = document.createElement('div');
        card.className = 'card';
        const tagsHTML = ponto.tipos.map(t => `<span class="tag tag-${t}">${t}</span>`).join('');

        card.innerHTML = `
          <div class="card-nome">${ponto.nome}</div>
          <div class="card-end">📍 ${ponto.endereco}</div>
          <div class="tags">${tagsHTML}</div>
        `;

        card.onclick = () => {
          mapa.setView([ponto.latitude, ponto.longitude], 16);
          m.openPopup();
          
          if (window.innerWidth <= 768) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
          
          document.querySelectorAll('.card').forEach(c => c.style.background = 'white');
          card.style.background = '#e8f5ee';
        };

        listaEl.appendChild(card);
      });
    }

    function filtrar(tipo, btnElemento) {
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('ativo'));
      btnElemento.classList.add('ativo');

      const filtrados = tipo === 'todos' 
        ? todosPontos 
        : todosPontos.filter(p => p.tipos.includes(tipo));

      renderizar(filtrados);
    }
  </script>

</body>
</html>
